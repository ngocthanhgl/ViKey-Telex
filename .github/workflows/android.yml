name: ViKey CI

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Qwen GGUF model
        run: |
          MODEL_DIR="app/src/main/assets/ime/dict"
          MODEL_FILE="$MODEL_DIR/qwen-pruned-50k-q5_0.gguf"
          if [ -f "$MODEL_FILE" ]; then
            echo "GGUF already present ($(du -h "$MODEL_FILE" | cut -f1))"
          else
            echo "Downloading GGUF from release assets..."
            mkdir -p "$MODEL_DIR"
            curl -L -o "$MODEL_FILE" "https://github.com/ngocthanhgl/ViKey-Telex/releases/download/Model/qwen-pruned-50k-q5_0.gguf"
            echo "Downloaded: $(du -h "$MODEL_FILE" | cut -f1))"
          fi

      - uses: gradle/actions/wrapper-validation@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@v4.0.2

      - name: Write release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "${{ runner.temp }}/vikey-release.jks"
            echo "Keystore written"
          else
            echo "No KEYSTORE_BASE64 secret; will use debug signing"
          fi

      - name: Build full version with Qwen GGUF
        env:
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          KS="${{ runner.temp }}/vikey-release.jks"
          EXTRA=""
          if [ -f "$KS" ]; then
            EXTRA="-PreleaseKeystore=$KS -PreleaseKeystorePassword=$KS_PASS -PreleaseKeyAlias=$KEY_ALIAS -PreleaseKeyPassword=$KEY_PASS"
          fi
          ./gradlew clean assembleRelease $EXTRA -Pandroid.isReproducibleBuild=true
        shell: bash

      - name: Stash full APKs
        run: |
          mkdir -p /tmp/apks
          for apk in app/build/outputs/apk/release/app-*-release.apk; do
            base=$(basename "$apk")
            abi=$(echo "$base" | sed 's/app-\(.*\)-release\.apk/\1/')
            cp "$apk" "/tmp/apks/ViKey-${GITHUB_REF_NAME}-${abi}.apk"
          done

      - name: Strip Qwen for lite build
        run: |
          rm -rf app/src/main/jniLibs/
          rm -f app/src/main/assets/ime/dict/qwen-pruned-50k-q5_0.gguf

      - name: Build lite version (without Qwen)
        env:
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          KS="${{ runner.temp }}/vikey-release.jks"
          EXTRA=""
          if [ -f "$KS" ]; then
            EXTRA="-PreleaseKeystore=$KS -PreleaseKeystorePassword=$KS_PASS -PreleaseKeyAlias=$KEY_ALIAS -PreleaseKeyPassword=$KEY_PASS"
          fi
          ./gradlew assembleRelease $EXTRA -Pandroid.isReproducibleBuild=true
        shell: bash

      - name: Rename and stash lite APKs
        run: |
          for apk in app/build/outputs/apk/release/app-*-release.apk; do
            base=$(basename "$apk")
            abi=$(echo "$base" | sed 's/app-\(.*\)-release\.apk/\1/')
            cp "$apk" "/tmp/apks/ViKey-${GITHUB_REF_NAME}-lite-${abi}.apk"
          done

      - name: Upload full APKs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ViKey-${{ github.ref_name }}-full
          path: /tmp/apks/ViKey-${{ github.ref_name }}-*.apk

      - name: Upload lite APKs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ViKey-${{ github.ref_name }}-lite
          path: /tmp/apks/ViKey-${{ github.ref_name }}-lite-*.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PRERELEASE=""
          if echo "$GITHUB_REF_NAME" | grep -qi "beta\|alpha\|rc"; then PRERELEASE="--prerelease"; fi
          gh release delete "$GITHUB_REF_NAME" --repo ${{ github.repository }} --yes 2>/dev/null || true
          APKS=$(ls /tmp/apks/ViKey-*.apk 2>/dev/null || true)
          if [ -n "$APKS" ]; then
            gh release create "$GITHUB_REF_NAME" \
              --repo ${{ github.repository }} \
              --title "ViKey $GITHUB_REF_NAME" \
              $PRERELEASE \
              --notes "Full variants include Qwen GGUF language model.\nLite variants exclude GGUF and fall back to frequency-based suggestions." \
              $APKS
          fi
