name: ViKey CI

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: gradle/actions/wrapper-validation@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@v4.0.2
      - name: Build with Gradle
        run: ./gradlew clean assembleRelease
      - name: Create Release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v1.1.0.1"
          gh release delete "$TAG" --repo ${{ github.repository }} --yes 2>/dev/null || true
          gh api -X DELETE "repos/${{ github.repository }}/git/refs/tags/$TAG" --silent 2>/dev/null || true
          gh release create "$TAG" \
            --repo ${{ github.repository }} \
            --title "ViKey $TAG" \
            --notes "APK with algorithmic Telex — English/Vietnamese suggestions removed (they interfered with Telex composing and caused bugs like vowel loss and word duplication)" \
            app/build/outputs/apk/release/app-release.apk
