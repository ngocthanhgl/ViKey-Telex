name: ViKey CI

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: gradle/actions/wrapper-validation@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@v4.0.2

      - name: Write release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "${{ runner.temp }}/vikey-release.jks"
            echo "Keystore written"
          else
            echo "No KEYSTORE_BASE64 secret; will use debug signing"
          fi

      - name: Build with Gradle
        env:
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          KS="${{ runner.temp }}/vikey-release.jks"
          EXTRA=""
          if [ -f "$KS" ]; then
            EXTRA="-PreleaseKeystore=$KS -PreleaseKeystorePassword=$KS_PASS -PreleaseKeyAlias=$KEY_ALIAS -PreleaseKeyPassword=$KEY_PASS"
          fi
          ./gradlew clean assembleRelease $EXTRA
        shell: bash

      - name: Rename APK
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mv app/build/outputs/apk/release/app-release.apk \
             "app/build/outputs/apk/release/ViKey-${GITHUB_REF_NAME}-universal.apk"

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            --repo ${{ github.repository }} \
            --title "ViKey $GITHUB_REF_NAME" \
            --notes "APK with algorithmic Telex — English/Vietnamese suggestions removed (they interfered with Telex composing and caused bugs like vowel loss and word duplication)" \
            "app/build/outputs/apk/release/ViKey-${GITHUB_REF_NAME}-universal.apk"
