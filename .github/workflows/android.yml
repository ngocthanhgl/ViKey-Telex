name: ViKey CI

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: gradle/actions/wrapper-validation@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@v4.0.2

      - name: Write release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "${{ runner.temp }}/vikey-release.jks"
            echo "Keystore written"
          else
            echo "No KEYSTORE_BASE64 secret; will use debug signing"
          fi

      - name: Build with Gradle
        env:
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          KS="${{ runner.temp }}/vikey-release.jks"
          EXTRA=""
          if [ -f "$KS" ]; then
            EXTRA="-PreleaseKeystore=$KS -PreleaseKeystorePassword=$KS_PASS -PreleaseKeyAlias=$KEY_ALIAS -PreleaseKeyPassword=$KEY_PASS"
          fi
          ./gradlew clean assembleRelease $EXTRA -Pandroid.isReproducibleBuild=true
        shell: bash

      - name: Rename APKs
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for apk in app/build/outputs/apk/release/*.apk; do
            base=$(basename "$apk")
            if [[ "$base" == app-*-*.apk ]]; then
              abi=$(echo "$base" | sed 's/app-\(.*\)-release\.apk/\1/')
              mv "$apk" "app/build/outputs/apk/release/ViKey-${GITHUB_REF_NAME}-${abi}.apk"
            fi
          done

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PRERELEASE=""
          if echo "$GITHUB_REF_NAME" | grep -qi "beta\|alpha\|rc"; then PRERELEASE="--prerelease"; fi
          gh release delete "$GITHUB_REF_NAME" --repo ${{ github.repository }} --yes 2>/dev/null || true
          APKS=$(ls app/build/outputs/apk/release/ViKey-*.apk 2>/dev/null || true)
          if [ -n "$APKS" ]; then
            gh release create "$GITHUB_REF_NAME" \
              --repo ${{ github.repository }} \
              --title "ViKey $GITHUB_REF_NAME" \
              $PRERELEASE \
              --notes "" \
              $APKS
          fi
